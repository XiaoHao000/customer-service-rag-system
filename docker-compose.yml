services:
  # ========== 基础服务 ==========

  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: support-etcd
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd_data:/etcd
    ports:
      - "2379:2379"
    command:
      - etcd
      - --data-dir=/etcd
      - --listen-client-urls=http://0.0.0.0:2379
      - --advertise-client-urls=http://support-etcd:2379
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2023-01-12T02-06-16Z
    container_name: support-minio
    environment:
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    restart: unless-stopped

  milvus:
    image: milvusdb/milvus:v2.4.10
    container_name: support-milvus
    depends_on:
      - etcd
      - minio
    ports:
      - "19532:19530"
      - "9093:9091"
    volumes:
      - milvus_data:/var/lib/milvus
    environment:
      - ETCD_ENDPOINTS=support-etcd:2379
      - MINIO_ADDRESS=support-minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - ETCD_AUTO_COMPACTION_RETENTION=0
    command: ["milvus", "run", "standalone"]
    restart: unless-stopped

  redis:
    image: redis:7.2
    container_name: support-redis
    ports:
      - "6381:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

  mysql:
    image: mysql:8.0.43
    container_name: support-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-12345678}
      MYSQL_DATABASE: support_kb
    ports:
      - "3307:3306"
    command: --local-infile=1 --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
      - mysql_data:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_PASSWORD:-12345678}"]
      interval: 5s
      timeout: 3s
      retries: 20

  # ========== 应用服务 ==========

  app:
    build: .
    container_name: support-app
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      milvus:
        condition: service_started
    ports:
      - "8087:8003"
    volumes:
      # 挂载模型文件（避免重复构建镜像）
      - ./rag_qa/models:/app/rag_qa/models
      - ./rag_qa/core/bert_query_classifier:/app/rag_qa/core/bert_query_classifier
      # 挂载知识库数据
      - ./rag_qa/data:/app/rag_qa/data
      # 挂载日志
      - ./logs:/app/logs
    environment:
      - API_KEY=${API_KEY}
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-12345678}
      - REDIS_HOST=redis
      - MILVUS_HOST=milvus
    restart: unless-stopped

volumes:
  etcd_data:
  minio_data:
  milvus_data:
  redis_data:
  mysql_data:
